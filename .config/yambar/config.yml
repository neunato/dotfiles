font_12: &font_12 ${font_family}:pixelsize=${font_size_12}
font_13: &font_13 ${font_family}:pixelsize=${font_size_13}
font_14: &font_14 ${font_family}:pixelsize=${font_size_14}
font_15: &font_15 ${font_family}:pixelsize=${font_size_15}
font_14_bold: &font_14_bold ${font_family}:pixelsize=${font_size_14}:weight=bold

bar:
  monitor: ${output}
  layer: top
  location: bottom
  height: ${height}
  spacing: ${spacing}
  margin: 0
  font: *font_15
  foreground: ${color_main}
  background: 00000000

  left:
    - pipewire:
        anchors:
          volume_icon: &volume_icon
            map:
              conditions:
                form_factor == headphones && description != "CalDigit Pro Audio Stereo" && ~muted:
                  string: { text: َ°‹‹ }
                form_factor == headphones && description != "CalDigit Pro Audio Stereo" && muted:
                  string: { text: َ°ںژ }
                ~muted:
                  string: { text: َ°•¾ }
                muted:
                  string: { text: َ°–پ }
        content:
          map:
            on-click:
              left: volume mute
              right: volume boost
              wheel-up: volume up
              wheel-down: volume down
            conditions:
              type == sink && muted:
                list:
                  foreground: "${color_red}"
                  items:
                    - string: { text: " " }
                    - *volume_icon
                    - string: { text: "{cubic_volume:3}%", left-margin: "${margin_icon}" }
              type == sink && ~muted:
                list:
                  foreground: "${color_main_bright}"
                  items:
                    - string: { text: " " }
                    - *volume_icon
                    - string: { text: "{cubic_volume:3}%", left-margin: "${margin_icon}" }

    - script:
        path: ~/scripts/yambar-brightness
        foreground: ${color_main_bright}
        content:
          list:
            on-click:
              left: night-light toggle
              wheel-up: brightness up
              wheel-down: brightness down
            items:
              - string: { text: َ°ƒ  }
              - string: { text: "{percent:3}%", left-margin: "${margin_icon}" }

    - battery:
        name: BAT0
        poll-interval: 30000
        anchors:
          battery_icon: &battery_icon
            map:
              conditions:
                state == unknown:
                  empty: {}
                state == charging || state == full:
                  string: { text: ï‡¦ }
                state != charging:
                  ramp:
                    tag: capacity
                    items:
                      - string: { text: ï‰„ }
                      - string: { text: ï‰ƒ }
                      - string: { text: ï‰ƒ }
                      - string: { text: ï‰‚ }
                      - string: { text: ï‰‚ }
                      - string: { text: ï‰پ }
                      - string: { text: ï‰پ }
                      - string: { text: ï‰€ }
        content:
          map:
            conditions:
              state == unknown:
                empty: {}
              state != charging && capacity <= 20:
                list:
                  foreground: "${color_red}"
                  items:
                    - *battery_icon
                    - string: { text: "{capacity:3}%", left-margin: "${margin_icon}" }
              state == charging || capacity > 20:
                - *battery_icon
                - string: { text: "{capacity:3}%", left-margin: "${margin_icon}" }

    - network:
        poll-interval: 10000
        content:
          map:
            conditions:
              name == wlan0 && state == up:
                - ramp:
                    tag: quality
                    items:
                      - string: { text: َ°¢؟ }
                      - string: { text: َ°¢¼ }
                      - string: { text: َ°¢¼ }
                      - string: { text: َ°¢½ }
                      - string: { text: َ°¢½ }
                      - string: { text: َ°¢¾ }
                - string: { text: "{quality:3}%", left-margin: "${margin_icon}", right-margin: "${double_spacing}" }
              name == wlan0 && state != up && quality == 0:
                empty: {}
              name == wlan0 && state != up:
                list:
                  foreground: "${color_red}"
                  items:
                    - string: { text: َ°¢؟ }
                    - string: { text: "{quality:3}%", left-margin: "${margin_icon}", right-margin: "${double_spacing}" }
              carrier && state == up:
                - string: { text: "َ°ˆ€ 100%", right-margin: "${double_spacing}" }

  center:
    - niri-workspaces:
        font: *font_12
        foreground: ${color_main_bright}
        content:
          map:
            on-click: niri msg action focus-workspace {id}
            conditions:
              active:
                string: { text: î©±, margin: "${margin_icon_workspaces}" }
              empty:
                empty: {}
              ~active:
                string: { text: îھ¼, margin: "${margin_icon_workspaces}" }

  right:
    - script:
        path: ~/scripts/yambar-screen-capture
        args:
          - ${output}
        font: *font_14
        content:
          map:
            on-click: screen-capture
            conditions:
              recording:
                string: { text: ï„‘, foreground: "${color_red}" }

    - script:
        path: ~/scripts/yambar-vpn
        font: *font_14
        content:
          map:
            on-click: vpn
            conditions:
              connected:
                string: { text: "|VPN|", foreground: "${color_main_bright}" }
              ~connected:
                string: { text: " VPN ", foreground: "${color_main_bright}" }

    - label:
        font: *font_13
        content:
          string:
            on-click:
              left: rofi-power
              right: sh -c "ROFI_RETV=1 rofi-power 'in 60 minutes'"
            text: " ï€‘ "

    - clock:
        time-format: "%d.%m.%Y. %H:%M "
        foreground: ${color_main_bright}
        content:
          - string:
              on-click: toggle "foot --app-id=calendar khal interactive"
              text: " {time}"
